<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My FiveM Server</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .button {
            text-decoration: none;
            background-color: #007bff;
            color: #ffffff;
            padding: 15px 25px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.3s ease;
            text-align: center;
        }

        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Welcome to Our FiveM Server</h1>
    <p>Join our community and explore everything our server has to offer. Connect with us on our platforms below!</p>
    <div class="button-container">
        <a href="https://discord.com/invite/YOUR_DISCORD_LINK" class="button" target="_blank">Join Discord</a>
        <a href="https://www.tiktok.com/@YOUR_TIKTOK_USERNAME" class="button" target="_blank">Visit TikTok</a>
        <a href="https://YOUR_SUPPORT_PAGE_LINK" class="button" target="_blank">Support Page</a>
        <a href="https://www.youtube.com/channel/YOUR_YOUTUBE_CHANNEL" class="button" target="_blank">Watch on YouTube</a>
    </div>
</body>
</html>
